name: CI/CD Pipeline

# DSA — DAG: this workflow is a directed acyclic graph of jobs.
# test and build-frontend run in parallel (same DAG level).
# build-image has an incoming edge from test — it cannot start
# until test completes successfully. Topological execution order.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Run Pest tests ──────────────────────────────────────────
  test:
    name: Run Pest tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: devflow_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, redis, mbstring, zip, bcmath
          coverage: none

      # DSA — Hash Map cache: composer.lock hash is the cache key.
      # If lockfile unchanged between commits, vendor/ is restored
      # from cache — O(1) lookup skipping the entire install step.
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend-devflow/vendor
          key: composer-${{ hashFiles('backend-devflow/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: backend-devflow
        run: composer install --no-interaction --no-scripts --prefer-dist

      - name: Copy .env for testing
        working-directory: backend-devflow
        run: cp .env.example .env.testing

      - name: Generate app key
        working-directory: backend-devflow
        run: php artisan key:generate --env=testing

      - name: Run database migrations
        working-directory: backend-devflow
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: devflow_test
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan migrate --env=testing --force

      - name: Run Pest tests
        working-directory: backend-devflow
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          BROADCAST_CONNECTION: "null"
          APP_KEY: base64:test_key_for_ci_do_not_use_in_production=
        run: php artisan test --parallel

  # ── Job 2: Build Nuxt frontend ────────────────────────────────────
  # Runs in parallel with the test job — no dependency between them
  build-frontend:
    name: Build Nuxt frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-devflow/package-lock.json

      # DSA — Hash Map cache: package-lock.json hash is the cache key.
      # Node modules install is the most expensive CI step — caching
      # reduces it from 3+ minutes to ~10 seconds on subsequent runs.
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend-devflow/node_modules
          key: node-${{ hashFiles('frontend-devflow/package-lock.json') }}
          restore-keys: node-

      - name: Install npm dependencies
        working-directory: frontend-devflow
        run: npm ci

      - name: Build Nuxt app
        working-directory: frontend-devflow
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8000/api
        run: npm run build

  # ── Job 3: Build and push Docker image ────────────────────────────
  # DSA — DAG incoming edge from test:
  # This job cannot start until the test job succeeds.
  # A failed test stops the entire deployment pipeline.
  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # DSA — Layer cache: BuildKit caches each Dockerfile layer.
      # The composer install layer is only rebuilt when composer.lock
      # changes — same cache invalidation pattern as Actions cache above.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-devflow
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}