services:

  backend:
    build:
      context: ./backend-devflow
    container_name: devflow_backend
    volumes:
      - ./backend-devflow:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=devflow
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - DB_REPLICA_HOST=mysql_replica
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=devflow
      - REVERB_APP_KEY=xzfyvnawjkjkgyians2y
      - REVERB_APP_SECRET=ypbd7qt8yvhwzd4jqchg
      - REVERB_HOST=reverb
      - REVERB_PORT=8081
      - REVERB_SCHEME=http
    healthcheck:
      test: ["CMD", "curl", "-f", "http://nginx/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - devflow_network
  reverb:
    build:
      context: ./backend-devflow
    container_name: devflow_reverb
    volumes:
      - ./backend-devflow:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database and Core
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=devflow
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - DB_REPLICA_HOST=mysql_replica
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis        # <--- ADD THIS
      - SESSION_DRIVER=redis
      
      # Reverb Configuration (Pulling from your .env)
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=${REVERB_PORT:-8081}
      - REVERB_SCHEME=${REVERB_SCHEME:-http}
    ports:
      - "${REVERB_PORT:-8081}:8081"
    command: php artisan reverb:start --host=0.0.0.0 --port=8081 --debug
    networks:
      - devflow_network
    restart: unless-stopped

  queue:
    build:
      context: ./backend-devflow
    container_name: devflow_queue
    volumes:
      - ./backend-devflow:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database Connections
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=devflow
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - DB_REPLICA_HOST=mysql_replica
      
      # Redis & Drivers
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      
      # Reverb / Broadcasting (Synced with your .env)
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=reverb
      - REVERB_PORT=8081
    # Added --queue=broadcasts to ensure real-time events process quickly
    command: php artisan queue:work --queue=default,broadcasts --tries=3
    networks:
      - devflow_network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: devflow_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend-devflow:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/api/health"] 
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - devflow_network

  frontend:
    build:
      context: ./frontend-devflow
    container_name: devflow_frontend
    working_dir: /app
    volumes:
      - ./frontend-devflow:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NODE_ENV=development
      - NUXT_PUBLIC_API_BASE=http://localhost:8000/api
    depends_on:
      nginx:
        condition: service_healthy
    command: sh -c "rm -rf .nuxt node_modules/.vite && npm install && NUXT_NO_WORKER=true npm run dev"
    networks:
      - devflow_network

  mysql:
    image: mysql:8
    container_name: devflow_mysql
    restart: always
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-do-db=devflow
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devflow
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - devflow_network

  mysql_replica:
    image: mysql:8
    container_name: devflow_mysql_replica
    restart: always
    ports:
      - "3307:3306"
    command: >
      --server-id=2
      --relay-log=mysql-relay-bin
      --read-only=1
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devflow
    volumes:
      - mysql_replica_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - devflow_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: devflow_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOSTS: mysql,mysql_replica
      PMA_USER: root
      PMA_PASSWORD: root
      PMA_PORT: 3306
    depends_on:
      - mysql
      - mysql_replica
    networks:
      - devflow_network

  redis:
    image: redis:7
    container_name: devflow_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - devflow_network

networks:
  devflow_network:
    driver: bridge

volumes:
  dbdata:
  mysql_replica_data:
  frontend_node_modules: