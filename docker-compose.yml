services:
  backend:
    build:
      context: ./backend-devflow
    container_name: devflow_backend
    volumes:
      - ./backend-devflow:/var/www
    ports:
      - "9000:9000"
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:latest
    container_name: devflow_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend-devflow:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend-devflow
    container_name: devflow_frontend
    working_dir: /app
    volumes:
      - ./frontend-devflow:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NODE_ENV=development
    depends_on:
      - backend
    command: sh -c "rm -rf .nuxt node_modules/.vite && npm install && NUXT_NO_WORKER=true npm run dev"

  mysql:
    image: mysql:8
    container_name: devflow_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devflow
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: devflow_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql

  redis:
    image: redis:7
    container_name: devflow_redis
    ports:
      - "6379:6379"

volumes:
  dbdata:
  frontend_node_modules:
  frontend_nuxt: