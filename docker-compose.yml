services:

  backend:
    build:
      context: ./backend-devflow
    container_name: devflow_backend
    volumes:
      - ./backend-devflow:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=devflow
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - DB_REPLICA_HOST=mysql_replica
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://nginx/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - devflow_network

  nginx:
    image: nginx:latest
    container_name: devflow_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend-devflow:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/api/health"] 
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - devflow_network

  frontend:
    build:
      context: ./frontend-devflow
    container_name: devflow_frontend
    working_dir: /app
    volumes:
      - ./frontend-devflow:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NODE_ENV=development
      - NUXT_PUBLIC_API_BASE=http://localhost:8000/api
    depends_on:
      nginx:
        condition: service_healthy
    command: sh -c "rm -rf .nuxt node_modules/.vite && npm install && NUXT_NO_WORKER=true npm run dev"
    networks:
      - devflow_network

  mysql:
    image: mysql:8
    container_name: devflow_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devflow
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - devflow_network

  mysql_replica:
    image: mysql:8
    container_name: devflow_mysql_replica
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devflow
    volumes:
      - mysql_replica_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - devflow_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: devflow_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOSTS: mysql,mysql_replica
      PMA_USER: root
      PMA_PASSWORD: root
      PMA_PORT: 3306
    depends_on:
      - mysql
      - mysql_replica
    networks:
      - devflow_network

  redis:
    image: redis:7
    container_name: devflow_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - devflow_network

networks:
  devflow_network:
    driver: bridge

volumes:
  dbdata:
  mysql_replica_data:
  frontend_node_modules: