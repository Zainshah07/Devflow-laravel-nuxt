limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;

upstream laravel_backend {
    server backend:9000;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_types
        application/json
        text/plain
        text/css
        application/javascript
        text/xml
        application/xml;

    add_header X-Frame-Options        "DENY"                             always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;

    # ── Auth login/register/refresh — strict rate limiting ────────
    location ~ ^/api/auth/(login|register|refresh) {
        limit_req zone=auth_zone burst=3 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass          laravel_backend;
        fastcgi_index         index.php;
        fastcgi_param         SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout  60s;
        include               fastcgi_params;
    }

    # ── Broadcasting auth — NO rate limiting, NO cache headers ────
    # Must be defined before the general /api block so Nginx
    # matches this exact location first.
    location = /api/broadcasting/auth {
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass          laravel_backend;
        fastcgi_index         index.php;
        fastcgi_param         SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout  120s;
        include               fastcgi_params;
    }

    # ── All other API routes ──────────────────────────────────────
    location /api {
        limit_req zone=api_zone burst=20 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass          laravel_backend;
        fastcgi_index         index.php;
        fastcgi_param         SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout  60s;
        include               fastcgi_params;

        add_header Cache-Control "no-store, no-cache" always;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass          laravel_backend;
        fastcgi_index         index.php;
        fastcgi_param         SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include               fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_page 429 @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"message":"Too many requests. Please slow down.","retry_after":60}';
    }
}