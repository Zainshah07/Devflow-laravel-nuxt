# ── Rate limiting zones ────────────────────────────────────────────
# DSA — Token Bucket algorithm:
# Each zone allocates shared memory tracking request rates per IP.
# 10m = 10MB shared memory (~160,000 IP entries).
# Requests consume tokens. Tokens refill at the defined rate.
# When the bucket is full, excess requests are rejected (nodelay).
limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;

# ── Single backend (PHP-FPM) ───────────────────────────────────────
# In production you would add multiple servers here and use
# least_conn for load balancing. With one backend, Nginx acts
# as a reverse proxy handling rate limiting, compression,
# and security headers — still valuable with a single backend.
upstream laravel_backend {
    server backend:9000;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php;

    # ── Gzip compression ──────────────────────────────────────────
    # Reduces JSON payload size by 60–80% before sending to client
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_types
        application/json
        text/plain
        text/css
        application/javascript
        text/xml
        application/xml;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options        "DENY"                          always;
    add_header X-Content-Type-Options "nosniff"                       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Auth endpoints — strict rate limiting ─────────────────────
    # DSA — Token Bucket: 5 req/min with burst of 3.
    # nodelay rejects immediately when burst is exceeded.
    location ~ ^/api/auth/(login|register|refresh) {
        limit_req zone=auth_zone burst=3 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.php?$query_string;

        fastcgi_pass           laravel_backend;
        fastcgi_index          index.php;
        fastcgi_param          SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout   60s;
        include                fastcgi_params;
    }

    # ── All API routes — general rate limiting ────────────────────
    location /api {
        limit_req zone=api_zone burst=20 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.php?$query_string;

        fastcgi_pass           laravel_backend;
        fastcgi_index          index.php;
        fastcgi_param          SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout   60s;
        include                fastcgi_params;

        add_header Cache-Control "no-store, no-cache" always;
    }

    # ── All other PHP routes ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass           laravel_backend;
        fastcgi_index          index.php;
        fastcgi_param          SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── 429 rate limit error response ─────────────────────────────
    error_page 429 @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"message":"Too many requests. Please slow down.","retry_after":60}';
    }
}